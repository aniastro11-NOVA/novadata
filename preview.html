<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>미리보기</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }

    #poster {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      cursor: pointer;
    }
    #poster img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    #play-btn {
      position: relative;
      z-index: 10;
      width: 80px;
      height: 80px;
      background: rgba(0,0,0,0.6);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      border: 3px solid rgba(255,255,255,0.7);
    }
    #play-btn::after {
      content: '';
      display: block;
      width: 0;
      height: 0;
      border-top: 18px solid transparent;
      border-bottom: 18px solid transparent;
      border-left: 30px solid #fff;
      margin-left: 6px;
    }

    #frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: none;
    }

    .back-btn {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 100;
      background: rgba(0,0,0,0.6);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
  </style>
</head>
<body>
  <button class="back-btn" onclick="history.back()">‹</button>

  <div id="poster">
    <img id="thumb-img" src="" alt="" />
    <div id="play-btn"></div>
  </div>

  <iframe id="frame" allowfullscreen allow="autoplay; encrypted-media; fullscreen"></iframe>

  <script>
    const p = new URLSearchParams(location.search);
    const id = p.get('id');
    const authuser = p.get('authuser') || '0';
    const thumb = p.get('thumb');

    if (thumb) {
      document.getElementById('thumb-img').src = thumb;
    }

    document.getElementById('poster').addEventListener('click', () => {
      document.getElementById('poster').style.display = 'none';
      const frame = document.getElementById('frame');
      frame.src = `https://drive.google.com/file/d/${id}/preview?authuser=${authuser}&autoplay=1`;
      frame.style.display = 'block';
    });
  </script>
</body>
</html>
