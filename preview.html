<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>미리보기</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    #wrap {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }
    #frame {
      width: 100vw;
      height: 100dvh;
      border: none;
      display: block;
    }
    .back-btn {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 100;
      background: rgba(0,0,0,0.6);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
  </style>
</head>
<body>
  <button class="back-btn" onclick="history.back()">‹</button>
  <div id="wrap">
    <iframe id="frame" allowfullscreen allow="autoplay; encrypted-media; fullscreen"></iframe>
  </div>
  <script>
    const p = new URLSearchParams(location.search);
    const id = p.get('id');
    const authuser = p.get('authuser') || '0';
    if (id) {
      document.getElementById('frame').src =
        `https://drive.google.com/file/d/${id}/preview?authuser=${authuser}`;
    }
  </script>
</body>
</html>
