<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>미리보기</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #vid {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    #frame {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      border: none;
      display: none;
    }
    .back-btn {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 100;
      background: rgba(0,0,0,0.6);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
  </style>
</head>
<body>
  <button class="back-btn" onclick="history.back()">‹</button>
  <video id="vid" autoplay playsinline controls></video>
  <iframe id="frame" allowfullscreen allow="autoplay; encrypted-media"></iframe>
  <script>
    const p = new URLSearchParams(location.search);
    const id = p.get('id');
    const authuser = p.get('authuser') || '0';
    const vid = document.getElementById('vid');
    const frame = document.getElementById('frame');

    if (id) {
      vid.src = `https://drive.google.com/uc?id=${id}&export=download&confirm=t`;
      vid.play().catch(() => {});

      vid.onerror = () => {
        vid.style.display = 'none';
        frame.src = `https://drive.google.com/file/d/${id}/preview?authuser=${authuser}`;
        frame.style.display = 'block';
      };
    }
  </script>
</body>
</html>
