<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NOVADATA</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NOVADATA">
</head>
<body>

  <div id="main-screen">
    <header>
      <span class="app-title">🎬</span>
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="태그 검색 (예: 달리기, 폭발)" />
        <button id="search-btn">🔍</button>
      </div>
      <button id="account-btn" title="계정 설정">👤</button>
    </header>

    <main>
      <div id="status-msg" class="status-msg">🔍 검색어를 입력하고 검색 버튼을 눌러주세요</div>
      <div id="results-grid" class="results-grid"></div>
    </main>
  </div>

  <!-- 인앱 미리보기 (풀스크린) -->
  <div id="preview-modal" class="hidden">
    <img id="preview-thumb" src="" alt="" />
    <video id="preview-video" controls playsinline preload="metadata"></video>
    <div id="preview-type-icon"></div>
    <button id="preview-close-btn">✕</button>
    <div class="preview-overlay-info">
      <div id="preview-title"></div>
      <div id="preview-tags"></div>
      <div class="preview-btns">
        <button id="preview-share-btn">공유하기</button>
        <button id="preview-copy-btn">링크 복사</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
