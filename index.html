<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NOVADATA</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NOVADATA">
</head>
<body>

  <div id="main-screen">
    <header>
      <div class="header-left">
        <span class="app-title">🎬 NOVADATA</span>
        <button id="account-btn" title="계정 설정">👤</button>
      </div>
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="해시태그 검색 (예: 달리기, 폭발)" />
        <button id="search-btn">🔍</button>
      </div>
    </header>

    <main>
      <div id="status-msg" class="status-msg">🔍 검색어를 입력하고 검색 버튼을 눌러주세요</div>
      <div id="results-grid" class="results-grid"></div>
    </main>
  </div>

  <!-- 인앱 미리보기 모달 -->
  <div id="preview-modal" class="hidden">
    <div class="preview-overlay" id="preview-overlay"></div>
    <div class="preview-sheet">
      <div class="preview-header">
        <span id="preview-title"></span>
        <div class="preview-actions">
          <button id="preview-open-btn">↗ 열기</button>
          <button id="preview-close-btn">✕</button>
        </div>
      </div>
      <div class="preview-body">
        <iframe id="preview-iframe" src="" allowfullscreen></iframe>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
